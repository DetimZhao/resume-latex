name: Build Resume PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  RESUME_NAME: Detim_Zhao_Resume

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        run: latexmk -pdf -jobname=${{ env.RESUME_NAME }} -outdir=build resume.tex

      - name: Generate date string
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload preview artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: resume-preview
          path: build/${{ env.RESUME_NAME }}.pdf

      - name: Prepare release assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp build/${{ env.RESUME_NAME }}.pdf build/${{ env.RESUME_NAME }}-${{ steps.date.outputs.date }}.pdf

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: "Resume ${{ steps.date.outputs.date }}"
          files: |
            build/${{ env.RESUME_NAME }}.pdf
            build/${{ env.RESUME_NAME }}-${{ steps.date.outputs.date }}.pdf
          make_latest: true
          generate_release_notes: false