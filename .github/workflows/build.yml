name: Build Resume PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      company:
        description: 'Company name (optional — sets PDF filename)'
        required: false
        type: string
      role:
        description: 'Target role (optional — sets PDF filename)'
        required: false
        type: string
      job_description:
        description: 'Paste the job description (for future agent tailoring)'
        required: false
        type: string

permissions:
  contents: write

env:
  BASE_NAME: Detim_Zhao_Resume

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set output filename
        id: filename
        run: |
          if [ -n "${{ inputs.company }}" ] || [ -n "${{ inputs.role }}" ]; then
            SUFFIX="-${{ inputs.company }}-${{ inputs.role }}"
            SUFFIX="$(echo "$SUFFIX" | sed 's/[^a-zA-Z0-9_-]/-/g' | sed 's/--*/-/g' | sed 's/-$//')"
            echo "jobname=${{ env.BASE_NAME }}${SUFFIX}" >> $GITHUB_OUTPUT
          else
            echo "jobname=${{ env.BASE_NAME }}" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX
        run: latexmk -pdf -jobname=${{ steps.filename.outputs.jobname }} -outdir=build resume.tex

      - name: Check page count
        run: |
          apt-get update -qq && apt-get install -y -qq poppler-utils
          PAGES=$(pdfinfo build/${{ steps.filename.outputs.jobname }}.pdf | grep Pages | awk '{print $2}')
          echo "PDF has $PAGES page(s)"
          if [ "$PAGES" -gt 1 ]; then
            echo "ERROR: PDF is $PAGES pages — max 1 page allowed. Reduce content and try again."
            exit 1
          fi

      - name: Generate date string
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload preview artifact (PR or branch push)
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: resume-preview
          path: build/${{ steps.filename.outputs.jobname }}.pdf

      - name: Upload tailored artifact (dispatch)
        if: github.event_name == 'workflow_dispatch' && (inputs.company != '' || inputs.role != '')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.filename.outputs.jobname }}
          path: build/${{ steps.filename.outputs.jobname }}.pdf

      - name: Prepare release assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp build/${{ steps.filename.outputs.jobname }}.pdf build/${{ steps.filename.outputs.jobname }}-${{ steps.date.outputs.date }}.pdf

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: "Resume ${{ steps.date.outputs.date }}"
          files: |
            build/${{ steps.filename.outputs.jobname }}.pdf
            build/${{ steps.filename.outputs.jobname }}-${{ steps.date.outputs.date }}.pdf
          make_latest: true
          generate_release_notes: false